openapi: 3.0.0
info:
  title: Shared Classes
  version: "1.0"
paths:
  # TODO warning in the logs during mvnci
  # Empty operationId found for path: GET /actuator/health. Renamed to auto-generated operationId: actuatorHealthGET
  /actuator/health:
    get:
      responses:
        200:
          description: OK

components:
  schemas:
    Base:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        createdOn:
          type: string
          format: date-time
        lastUpdatedOn:
          type: string
          format: date-time